name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # GitHub Actions kör på linux/amd64. docker-compose.yml har platform: linux/arm64
      # (satt för Mac M-chip). Den här env-variabeln overridar det globalt i CI
      # utan att vi behöver ändra docker-compose.yml.
      - name: Set Docker platform for CI
        run: echo "DOCKER_DEFAULT_PLATFORM=linux/amd64" >> $GITHUB_ENV

      # Backend och worker läser ./backend/.env — inte en .env i rooten.
      # Skapar minimala värden som räcker för att starta tjänsten och köra tester.
      # Riktiga API-nycklar behövs inte eftersom AI-anrop är mockade i testerna.
      - name: Create backend .env
        run: |
          cat > backend/.env << 'EOF'
          ANTHROPIC_API_KEY=test-key
          OPENAI_API_KEY=test-key
          DATABASE_URL=postgresql://feedpilot:feedpilot@postgres:5432/feedpilot
          REDIS_URL=redis://redis:6379
          EOF

      # Startar postgres, redis och backend i bakgrunden.
      # worker utelämnas medvetet — den behövs inte för att köra pytest.
      - name: Build and start services
        run: docker compose up -d --build postgres redis backend

      # Väntar tills postgres accepterar anslutningar.
      # Utan denna wait kan tester misslyckas med "connection refused".
      - name: Wait for postgres to be ready
        run: |
          echo "Waiting for postgres..."
          timeout 60 bash -c \
            'until docker compose exec -T postgres pg_isready -U feedpilot; do sleep 2; done'

      # Väntar tills FastAPI är uppe och svarar på /health.
      # Porten är 8010 (mappad från 8000 inuti containern).
      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend..."
          timeout 60 bash -c \
            'until curl -sf http://localhost:8010/health > /dev/null; do sleep 2; done'

      # Kör alla tester inuti backend-containern, precis som lokalt.
      - name: Run pytest
        run: docker compose exec -T backend pytest tests/ -v

      # Körs alltid, även om tester failar.
      - name: Stop services
        if: always()
        run: docker compose down -v

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — lint + tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Lint
        run: npm run lint --prefix frontend

      - name: Run tests
        run: npm test --prefix frontend -- --runInBand --passWithNoTests
