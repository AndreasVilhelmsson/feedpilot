name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Skapar en minimal .env så docker compose inte krashar på saknade vars.
      # Riktiga API-nycklar behövs inte för tester eftersom AI-anrop är mockade.
      - name: Create .env from example
        run: |
          cp .env.example .env
          echo "ANTHROPIC_API_KEY=test-key" >> .env
          echo "OPENAI_API_KEY=test-key" >> .env

      # Startar postgres, redis och backend-containern i bakgrunden.
      # --build säkerställer att image är uppdaterad med senaste koden.
      - name: Build and start services
        run: docker compose up -d --build

      # Väntar tills postgres accepterar anslutningar innan pytest körs.
      # Utan denna wait kan tester misslyckas med "connection refused".
      - name: Wait for postgres to be ready
        run: |
          echo "Waiting for postgres..."
          timeout 60 bash -c \
            'until docker compose exec -T postgres pg_isready -U feedpilot; do sleep 2; done'

      # Väntar tills backend-containern är uppe och FastAPI har startat.
      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend..."
          timeout 60 bash -c \
            'until curl -sf http://localhost:8010/health > /dev/null; do sleep 2; done'

      # Kör alla tester inuti backend-containern, precis som lokalt.
      # -v ger verbose output — du ser exakt vilket test som failar.
      - name: Run pytest
        run: docker compose exec -T backend pytest tests/ -v

      # Körs alltid, även om tester failar — annars hänger containrar kvar.
      - name: Stop services
        if: always()
        run: docker compose down -v

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — lint + tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Node installeras direkt på runnern, inte i Docker.
      # cache: npm sparar node_modules mellan körningar → snabbare CI.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # npm ci är snabbare än npm install och garanterar exakta versioner
      # från package-lock.json — viktigt för reproducerbara CI-byggen.
      - name: Install dependencies
        run: npm ci --prefix frontend

      # ESLint — fångar typfel och kodstilsbrott.
      - name: Lint
        run: npm run lint --prefix frontend

      # Jest — kör alla komponenttester.
      # --runInBand kör tester seriellt (undviker race conditions i CI).
      # --passWithNoTests hindrar CI från att misslyckas om inga tester hittas.
      - name: Run tests
        run: npm test --prefix frontend -- --runInBand --passWithNoTests
