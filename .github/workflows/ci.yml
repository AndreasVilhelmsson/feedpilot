name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ───────────────────────────────────────────────────────────────
  backend:
    name: Backend — pytest
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Backend och worker läser ./backend/.env — inte en .env i rooten.
      # Skapar minimala värden som räcker för att starta tjänsten och köra tester.
      # Riktiga API-nycklar behövs inte eftersom AI-anrop är mockade i testerna.
      - name: Create backend .env
        run: |
          cat > backend/.env << 'EOF'
          ANTHROPIC_API_KEY=test-key
          OPENAI_API_KEY=test-key
          DATABASE_URL=postgresql://feedpilot:feedpilot@postgres:5432/feedpilot
          REDIS_URL=redis://redis:6379
          EOF

      # docker-compose.yml har platform: linux/arm64 på alla services (för Mac M-chip).
      # docker-compose.ci.yml overridar detta till linux/amd64 för GitHub Actions runner.
      # worker utelämnas medvetet — behövs inte för att köra pytest.
      - name: Build and start services
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --build postgres redis backend

      # Väntar tills postgres accepterar anslutningar.
      - name: Wait for postgres to be ready
        run: |
          echo "Waiting for postgres..."
          timeout 60 bash -c \
            'until docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T postgres pg_isready -U feedpilot; do sleep 2; done'

      # Health-routern är registrerad med prefix /api/v1 i main.py.
      # Rätt path är därför /api/v1/health — inte /health.
      - name: Wait for backend to be healthy
        run: |
          echo "Waiting for backend..."
          timeout 90 bash -c \
            'until curl -sf http://localhost:8010/api/v1/health > /dev/null; do sleep 3; done'

      # Dumpar backend-loggar om något gick fel — underlättar felsökning.
      - name: Show backend logs on failure
        if: failure()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml logs backend

      # Kör alla tester inuti backend-containern, precis som lokalt.
      - name: Run pytest
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml exec -T backend pytest tests/ -v

      # Körs alltid, även om tester failar.
      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

  # ── Frontend ──────────────────────────────────────────────────────────────
  frontend:
    name: Frontend — lint + tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci --prefix frontend

      - name: Lint
        run: npm run lint --prefix frontend

      - name: Run tests
        run: npm test --prefix frontend -- --runInBand --passWithNoTests
